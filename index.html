<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artchemys — Chemistry That Protects Art</title>
<meta name="description" content="Artchemys develops innovative chemical solutions for art conservation. Spin-off of the University of Warsaw and National Museum in Warsaw.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D0D0B;
    --parchment: #F5F0E8;
    --gold: #B8943A;
    --gold-light: #D4AF5C;
    --gold-pale: #F0E4C4;
    --verdigris: #2D6B5E;
    --verdigris-light: #3D8B7A;
    --stone: #8C8478;
    --stone-light: #C4BDB2;
    --cream: #FAF7F2;
    --white: #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    overflow-x: hidden;
    line-height: 1.5; /* Poprawa czytelności */
  }

  /* ── CURSOR ── */
  @media (pointer: fine) { /* Kursor tylko dla urządzeń z myszką */
    body { cursor: none; }
    .cursor {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease-out;
      mix-blend-mode: multiply;
    }
    .cursor-ring {
      width: 32px; height: 32px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.2s ease-out, opacity 0.3s;
      opacity: 0.6;
    }
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 24px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.4s ease;
  }
  
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-decoration: none;
    z-index: 2;
  }
  .nav-logo span { color: var(--gold); }
  
  .nav-links {
    display: flex;
    gap: 40px;
    list-style: none;
  }
  .nav-links a {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    position: relative;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 140px 60px 80px;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 8vw, 82px);
    font-weight: 300;
    line-height: 0.95;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.4s;
  }
  .hero-title em { font-style: italic; color: var(--gold); }

  .hero-right {
    position: relative;
    background: var(--ink);
    min-height: 500px;
  }

  /* ── MOLECULE ANIMATION ── */
  .hero-molecule {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
  }
  
  .molecule-circle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(184,148,58,0.2);
  }
  .mc1 { width: 80px; height: 80px; background: rgba(184,148,58,0.1); }
  .mc2 { width: 160px; height: 160px; }
  .mc3 { width: 240px; height: 240px; }

  /* ── SECTIONS ── */
  section { padding: 120px 60px; }
  
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── MARKET GRID ── */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1024px) {
    nav { padding: 20px 30px; }
    .nav-links { display: none; } /* Uproszczenie na mobile */
    .hero { grid-template-columns: 1fr; }
    section { padding: 80px 30px; }
    .hero-left { padding: 140px 30px 60px; }
  }

  /* Animacje */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="mainNav">
  <a href="#" class="nav-logo">Art<span>chemys</span></a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#product">Technology</a></li>
    <li><a href="#science">Science</a></li>
    <li><a href="#market">Market</a></li>
  </ul>
  <a href="#contact" class="nav-cta">Contact Us</a>
</nav>

<section class="hero">
  <div class="hero-left">
    <div class="hero-eyebrow" style="opacity:0; animation: fadeUp 1s ease forwards 0.2s;">Chemistry That Reveals Truth</div>
    <h1 class="hero-title">
      Art meets<br>
      <em>Chemistry.</em><br>
      Future begins.
    </h1>
    <p class="hero-subtitle" style="opacity:0; animation: fadeUp 1s ease forwards 0.6s;">
      Artchemys develops innovative chemical solutions for art conservation and beyond. 
      Spin-off of the University of Warsaw and National Museum in Warsaw.
    </p>
  </div>
  <div class="hero-right">
    <div class="hero-molecule">
      <div class="molecule-circle mc1"></div>
      <div class="molecule-circle mc2"></div>
      <div class="molecule-circle mc3"></div>
    </div>
  </div>
</section>

<script>
  // 1. Poprawiony kursor (płynność i obsługa dotyku)
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');

  if (window.matchMedia("(pointer: fine)").matches) {
    document.addEventListener('mousemove', (e) => {
      // Używamy requestAnimationFrame dla lepszej wydajności
      window.requestAnimationFrame(() => {
        cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
        ring.style.transform = `translate3d(${e.clientX - 12}px, ${e.clientY - 12}px, 0)`;
      });
    });
  }

  // 2. Obsługa nawigacji przy skrolowaniu
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      nav.style.background = 'rgba(245,240,232,0.95)';
      nav.style.padding = '15px 60px';
      nav.style.backdropFilter = 'blur(10px)';
    } else {
      nav.style.background = 'transparent';
      nav.style.padding = '24px 60px';
      nav.style.backdropFilter = 'none';
    }
  });

  // 3. Obsługa Reveal (Intersection Observer)
  const observerOptions = {
    threshold: 0.15,
    rootMargin: '0px 0px -50px 0px'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, observerOptions);

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // 4. Obsługa formularza
  function handleSubmit(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const originalText = btn.textContent;
    btn.textContent = 'Sending...';
    
    // Symulacja wysyłki
    setTimeout(() => {
      alert('Thank you, Krzysiek! Your message has been sent.');
      btn.textContent = originalText;
      e.target.reset();
    }, 1500);
  }
</script>

</body>
</html>
